resources:
  jobs:
    demo:
      name: "[${bundle.target}] Multi-Genie Demo - End to End"
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ../notebooks/01_setup_data.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}

        - task_key: create_genie_spaces
          depends_on:
            - task_key: generate_data
          notebook_task:
            notebook_path: ../notebooks/02_create_genie_spaces.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              warehouse_id: ${var.warehouse_id}

        - task_key: build_agent
          depends_on:
            - task_key: create_genie_spaces
          notebook_task:
            notebook_path: ../notebooks/03_agent_build.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              model_name: ${var.model_name}
              llm_endpoint: ${var.llm_endpoint}
              experiment_name: ${resources.experiments.multi_genie_experiment.name}

        - task_key: deploy_agent
          depends_on:
            - task_key: build_agent
          notebook_task:
            notebook_path: ../notebooks/04_deploy_agent.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              model_name: ${var.model_name}
              experiment_name: ${resources.experiments.multi_genie_experiment.name}

        - task_key: test_evaluate
          depends_on:
            - task_key: deploy_agent
          notebook_task:
            notebook_path: ../notebooks/05_test_and_evaluate.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              model_name: ${var.model_name}
              experiment_name: ${resources.experiments.multi_genie_experiment.name}
