resources:
  jobs:
    setup:
      name: "[${bundle.target}] Multi-Genie Demo - Setup Data & Genie Spaces"
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ../notebooks/01_setup_data.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}

        - task_key: create_genie_spaces
          depends_on:
            - task_key: generate_data
          notebook_task:
            notebook_path: ../notebooks/02_create_genie_spaces.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              warehouse_id: ${var.warehouse_id}
